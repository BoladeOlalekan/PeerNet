# netlify.toml
# Netlify Configuration for PeerNet Admin Dashboard

[build]
  # The directory to deploy (served as the website root)
  publish = "admin"

  # Build command: dynamically generates config.js with Netlify environment variables before deployment
  command = "echo \"const CONFIG = { SUPABASE_URL: '$SUPABASE_URL', SUPABASE_ANON_KEY: '$SUPABASE_ANON_KEY' };\" > admin/js/config.js"
